<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 680 820" style="background:#ffffff;font-family:ui-sans-serif,system-ui,sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6B7A94" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="340" y="18" text-anchor="middle" font-size="12" fill="#888780" font-family="ui-sans-serif,sans-serif">Sources</text>

<rect x="130" y="26" width="190" height="50" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="225" y="47" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A" font-family="ui-sans-serif,sans-serif">dbo.RawSales</text>
<text x="225" y="65" text-anchor="middle" font-size="12" fill="#5F5E5A" font-family="ui-sans-serif,sans-serif">Source — messy sales data</text>

<rect x="360" y="26" width="190" height="50" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="455" y="47" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A" font-family="ui-sans-serif,sans-serif">dbo.Products</text>
<text x="455" y="65" text-anchor="middle" font-size="12" fill="#5F5E5A" font-family="ui-sans-serif,sans-serif">Lookup — product reference</text>

<line x1="225" y1="76" x2="225" y2="114" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="30" y="114" width="620" height="598" rx="14" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="7 4"/>
<text x="340" y="132" text-anchor="middle" font-size="12" fill="#888780" font-family="ui-sans-serif,sans-serif">DF_RawSales_Transformation — Mapping Data Flow</text>

<!-- 1. Filter -->
<rect x="130" y="142" width="190" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="225" y="162" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C" font-family="ui-sans-serif,sans-serif">① Filter</text>
<text x="225" y="182" text-anchor="middle" font-size="12" fill="#993C1D" font-family="ui-sans-serif,sans-serif">Remove nulls &amp; invalid rows</text>
<line x1="350" y1="27" x2="310" y2="169" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="360" y="140" font-size="11" fill="#B4B2A9" font-family="ui-sans-serif,sans-serif">joins later</text>
<line x1="225" y1="196" x2="225" y2="234" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="320" y1="169" x2="456" y2="169" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="460" y="164" font-size="12" fill="#888780" font-family="ui-sans-serif,sans-serif">!isNull(SaleId)</text>
<text x="460" y="180" font-size="12" fill="#888780" font-family="ui-sans-serif,sans-serif">&amp;&amp; Quantity &gt; 0</text>

<!-- 2. Select -->
<rect x="130" y="234" width="190" height="54" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="225" y="254" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C" font-family="ui-sans-serif,sans-serif">② Select &amp; rename</text>
<text x="225" y="274" text-anchor="middle" font-size="12" fill="#534AB7" font-family="ui-sans-serif,sans-serif">Standardise column names</text>
<line x1="225" y1="288" x2="225" y2="326" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="320" y1="261" x2="456" y2="261" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="460" y="256" font-size="12" fill="#888780" font-family="ui-sans-serif,sans-serif">sale_id → SaleId</text>
<text x="460" y="272" font-size="12" fill="#888780" font-family="ui-sans-serif,sans-serif">prod_id → ProductId</text>

<!-- 3. Derived Column -->
<rect x="130" y="326" width="190" height="54" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="225" y="346" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C" font-family="ui-sans-serif,sans-serif">③ Derived column</text>
<text x="225" y="366" text-anchor="middle" font-size="12" fill="#534AB7" font-family="ui-sans-serif,sans-serif">Compute new fields</text>
<line x1="225" y1="380" x2="225" y2="418" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="320" y1="353" x2="456" y2="353" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="460" y="344" font-size="12" fill="#888780" font-family="ui-sans-serif,sans-serif">LineTotal = Qty × UnitPrice</text>
<text x="460" y="360" font-size="12" fill="#888780" font-family="ui-sans-serif,sans-serif">SaleYear, SaleMonth</text>
<text x="460" y="376" font-size="12" fill="#888780" font-family="ui-sans-serif,sans-serif">LoadDate = currentDate()</text>

<!-- 4. Lookup Join -->
<rect x="130" y="418" width="190" height="54" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="225" y="438" text-anchor="middle" font-size="14" font-weight="500" fill="#042C53" font-family="ui-sans-serif,sans-serif">④ Lookup join</text>
<text x="225" y="458" text-anchor="middle" font-size="12" fill="#185FA5" font-family="ui-sans-serif,sans-serif">Enrich with product details</text>
<path d="M455 76 L455 445 L320 445" fill="none" stroke="#6B7A94" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="225" y1="472" x2="225" y2="510" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="320" y1="445" x2="456" y2="445" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="460" y="436" font-size="12" fill="#888780" font-family="ui-sans-serif,sans-serif">join on ProductId</text>
<text x="460" y="452" font-size="12" fill="#888780" font-family="ui-sans-serif,sans-serif">adds Category, Brand</text>

<!-- 5. Aggregate -->
<rect x="130" y="510" width="190" height="54" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="225" y="530" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C" font-family="ui-sans-serif,sans-serif">⑤ Aggregate</text>
<text x="225" y="550" text-anchor="middle" font-size="12" fill="#0F6E56" font-family="ui-sans-serif,sans-serif">Group &amp; compute KPIs</text>
<line x1="225" y1="564" x2="225" y2="602" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="320" y1="537" x2="456" y2="537" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="460" y="528" font-size="12" fill="#888780" font-family="ui-sans-serif,sans-serif">group by Region, Category</text>
<text x="460" y="544" font-size="12" fill="#888780" font-family="ui-sans-serif,sans-serif">SUM(LineTotal), COUNT(*)</text>

<!-- 6. Conditional Split -->
<rect x="130" y="602" width="190" height="54" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="225" y="622" text-anchor="middle" font-size="14" font-weight="500" fill="#412402" font-family="ui-sans-serif,sans-serif">⑥ Conditional split</text>
<text x="225" y="642" text-anchor="middle" font-size="12" fill="#854F0B" font-family="ui-sans-serif,sans-serif">Route by TotalRevenue</text>
<line x1="320" y1="629" x2="456" y2="629" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="460" y="620" font-size="12" fill="#888780" font-family="ui-sans-serif,sans-serif">High &gt;= 1000 → premium</text>
<text x="460" y="636" font-size="12" fill="#888780" font-family="ui-sans-serif,sans-serif">else → standard</text>

<path d="M195 656 L195 696" fill="none" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M255 656 L255 696" fill="none" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Sinks -->
<rect x="60" y="696" width="180" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="150" y="717" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C" font-family="ui-sans-serif,sans-serif">Sink — premium</text>
<text x="150" y="735" text-anchor="middle" font-size="12" fill="#0F6E56" font-family="ui-sans-serif,sans-serif">gold/premium.parquet</text>

<rect x="200" y="696" width="180" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="290" y="717" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C" font-family="ui-sans-serif,sans-serif">Sink — standard</text>
<text x="290" y="735" text-anchor="middle" font-size="12" fill="#0F6E56" font-family="ui-sans-serif,sans-serif">gold/standard.parquet</text>

<text x="340" y="810" text-anchor="middle" font-size="11" fill="#B4B2A9" font-family="ui-sans-serif,sans-serif">Azure Data Factory v2 · Mapping Data Flow · April 2026</text>
</svg>
