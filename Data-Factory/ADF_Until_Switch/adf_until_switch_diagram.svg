<svg xmlns="http://www.w3.org/2000/svg" width="800" viewBox="0 0 680 780" style="background:#fff;font-family:ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6B7A94" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="22" text-anchor="middle" font-size="14" font-weight="500" fill="#1A2030">Order processing — Switch + Until pipeline</text>
  <!-- Source -->
  <rect x="215" y="34" width="250" height="50" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="55" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A" dominant-baseline="central">dbo.PendingOrders</text>
  <text x="340" y="73" text-anchor="middle" font-size="12" fill="#5F5E5A" dominant-baseline="central">Source — Azure SQL DB</text>
  <line x1="340" y1="84" x2="340" y2="114" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Lookup -->
  <rect x="215" y="114" width="250" height="50" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="135" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C" dominant-baseline="central">Lookup — fetch pending orders</text>
  <text x="340" y="153" text-anchor="middle" font-size="12" fill="#185FA5" dominant-baseline="central">SELECT * FROM dbo.PendingOrders</text>
  <line x1="340" y1="164" x2="340" y2="194" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- ForEach container -->
  <rect x="155" y="194" width="370" height="390" rx="10" fill="none" stroke="#BA7517" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="174" y="214" font-size="12" font-weight="500" fill="#BA7517">ForEach — iterate orders</text>
  <!-- Switch -->
  <rect x="215" y="224" width="250" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="246" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C" dominant-baseline="central">Switch — route by category</text>
  <text x="340" y="264" text-anchor="middle" font-size="12" fill="#534AB7" dominant-baseline="central">@item().ProductCategory</text>
  <!-- Branch lines -->
  <line x1="260" y1="276" x2="180" y2="308" stroke="#888780" stroke-width="0.8" opacity=".5"/>
  <line x1="340" y1="276" x2="340" y2="308" stroke="#888780" stroke-width="0.8" opacity=".5"/>
  <line x1="420" y1="276" x2="500" y2="308" stroke="#888780" stroke-width="0.8" opacity=".5"/>
  <text x="178" y="304" text-anchor="middle" font-size="12" fill="#0F6E56">Electronics</text>
  <text x="340" y="304" text-anchor="middle" font-size="12" fill="#185FA5">Clothing</text>
  <text x="502" y="304" text-anchor="middle" font-size="12" fill="#854F0B">Furniture</text>
  <!-- Branch boxes -->
  <rect x="120" y="314" width="120" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="180" y="336" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">Premium check</text>
  <text x="180" y="354" text-anchor="middle" font-size="12" fill="#0F6E56" dominant-baseline="central">Copy + validate</text>
  <rect x="280" y="314" width="120" height="52" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="336" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C" dominant-baseline="central">Standard copy</text>
  <text x="340" y="354" text-anchor="middle" font-size="12" fill="#185FA5" dominant-baseline="central">Direct to sink</text>
  <rect x="440" y="314" width="120" height="52" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="500" y="336" text-anchor="middle" font-size="14" font-weight="500" fill="#412402" dominant-baseline="central">Bulk check</text>
  <text x="500" y="354" text-anchor="middle" font-size="12" fill="#633806" dominant-baseline="central">Weight + dims</text>
  <!-- Converge arrows -->
  <line x1="180" y1="366" x2="180" y2="400" stroke="#888780" stroke-width="0.8" opacity=".5"/>
  <line x1="340" y1="366" x2="340" y2="400" stroke="#888780" stroke-width="0.8" opacity=".5"/>
  <line x1="500" y1="366" x2="500" y2="400" stroke="#888780" stroke-width="0.8" opacity=".5"/>
  <line x1="180" y1="400" x2="500" y2="400" stroke="#888780" stroke-width="0.8" opacity=".5"/>
  <line x1="340" y1="400" x2="340" y2="418" stroke="#888780" stroke-width="0.8" opacity=".5" marker-end="url(#arrow)"/>
  <!-- Until container -->
  <rect x="175" y="418" width="330" height="148" rx="10" fill="none" stroke="#A32D2D" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="194" y="436" font-size="12" font-weight="500" fill="#A32D2D">Until — retry API confirmation</text>
  <rect x="195" y="446" width="135" height="46" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="262" y="465" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A" dominant-baseline="central">Wait activity</text>
  <text x="262" y="483" text-anchor="middle" font-size="12" fill="#5F5E5A" dominant-baseline="central">30s back-off</text>
  <rect x="350" y="446" width="135" height="46" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="417" y="465" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C" dominant-baseline="central">Web activity</text>
  <text x="417" y="483" text-anchor="middle" font-size="12" fill="#993C1D" dominant-baseline="central">POST confirm API</text>
  <text x="340" y="514" text-anchor="middle" font-size="12" fill="#444441">Until: API success OR retries = 3</text>
  <text x="340" y="530" text-anchor="middle" font-size="11" fill="#888780">@or(v_APISuccess, greaterOrEquals(v_RetryCount,3))</text>
  <path d="M175 496 L160 496 L160 460 L175 460" fill="none" stroke="#888780" stroke-width="0.8" opacity=".5" marker-end="url(#arrow)"/>
  <text x="118" y="480" text-anchor="middle" font-size="12" fill="#888780">retry</text>
  <line x1="340" y1="566" x2="340" y2="600" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Set Variable -->
  <rect x="215" y="600" width="250" height="50" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="621" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C" dominant-baseline="central">Set variable — log result</text>
  <text x="340" y="639" text-anchor="middle" font-size="12" fill="#534AB7" dominant-baseline="central">v_ProcessedCount + status</text>
  <line x1="340" y1="650" x2="340" y2="680" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Sink -->
  <rect x="215" y="680" width="250" height="50" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="701" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">Sink — dbo.ProcessedOrders</text>
  <text x="340" y="719" text-anchor="middle" font-size="12" fill="#0F6E56" dominant-baseline="central">Azure SQL DB — results</text>
  <text x="340" y="758" text-anchor="middle" font-size="11" fill="#B4B2A9">Azure Data Factory v2 · Until + Switch · April 2026</text>
</svg>
