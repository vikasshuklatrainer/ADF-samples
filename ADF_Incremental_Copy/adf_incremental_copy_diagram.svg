<svg xmlns="http://www.w3.org/2000/svg" width="800" viewBox="0 0 680 720" style="background:#ffffff;font-family:ui-sans-serif,system-ui,sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6B7A94" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="340" y="22" text-anchor="middle" font-size="14" font-weight="500" fill="#1A2030">Watermark-based incremental copy pattern</text>

  <!-- ── Source: dbo.Orders ───────────────────────────────── -->
  <rect x="60" y="38" width="200" height="54" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="160" y="60" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Source — dbo.Orders</text>
  <text x="160" y="80" text-anchor="middle" font-size="12" fill="#5F5E5A">ModifiedDate watermark column</text>

  <!-- ── Control: WatermarkTable ─────────────────────────── -->
  <rect x="420" y="38" width="200" height="54" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="520" y="60" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Control — WatermarkTable</text>
  <text x="520" y="80" text-anchor="middle" font-size="12" fill="#5F5E5A">Stores last copied timestamp</text>

  <!-- Converging lines to pipeline container top -->
  <line x1="160" y1="92" x2="160" y2="132" stroke="#6B7A94" stroke-width="1" opacity="0.6" marker-end="url(#arrow)"/>
  <line x1="520" y1="92" x2="520" y2="132" stroke="#6B7A94" stroke-width="1" opacity="0.6" marker-end="url(#arrow)"/>
  <line x1="160" y1="132" x2="280" y2="132" stroke="#6B7A94" stroke-width="1" opacity="0.4"/>
  <line x1="520" y1="132" x2="400" y2="132" stroke="#6B7A94" stroke-width="1" opacity="0.4"/>

  <!-- ── Pipeline container (dashed) ────────────────────── -->
  <rect x="40" y="132" width="600" height="456" rx="14" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="7 4"/>
  <text x="340" y="152" text-anchor="middle" font-size="12" fill="#888780">PL_Incremental_Copy pipeline</text>

  <!-- ── Step 1: Lookup old watermark (blue) ────────────── -->
  <rect x="200" y="162" width="280" height="58" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="184" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">① Lookup — get old watermark</text>
  <text x="340" y="204" text-anchor="middle" font-size="12" fill="#185FA5">SELECT WatermarkValue FROM WatermarkTable</text>

  <line x1="340" y1="220" x2="340" y2="258" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── Step 2: Lookup new watermark (blue) ────────────── -->
  <rect x="200" y="258" width="280" height="58" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="280" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">② Lookup — get new watermark</text>
  <text x="340" y="300" text-anchor="middle" font-size="12" fill="#185FA5">SELECT MAX(ModifiedDate) FROM dbo.Orders</text>

  <line x1="340" y1="316" x2="340" y2="354" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── Step 3: Copy delta rows (teal) ─────────────────── -->
  <rect x="200" y="354" width="280" height="60" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="376" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">③ Copy — delta rows only</text>
  <text x="340" y="396" text-anchor="middle" font-size="12" fill="#0F6E56">WHERE ModifiedDate &gt; old AND ≤ new</text>

  <line x1="340" y1="414" x2="340" y2="452" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── Step 4: Stored Procedure (purple) ──────────────── -->
  <rect x="200" y="452" width="280" height="58" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="474" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">④ Stored procedure — update mark</text>
  <text x="340" y="494" text-anchor="middle" font-size="12" fill="#534AB7">UPDATE WatermarkTable SET WatermarkValue</text>

  <!-- ── Run complete ────────────────────────────────────── -->
  <line x1="340" y1="510" x2="340" y2="548" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="240" y="548" width="200" height="40" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="573" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Run complete ✓</text>

  <!-- ── Right-side callout annotations ─────────────────── -->
  <line x1="480" y1="191" x2="510" y2="191" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="514" y="187" font-size="12" fill="#888780">old mark = last run's</text>
  <text x="514" y="203" font-size="12" fill="#888780">max timestamp</text>

  <line x1="480" y1="287" x2="510" y2="287" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="514" y="283" font-size="12" fill="#888780">new mark = current</text>
  <text x="514" y="299" font-size="12" fill="#888780">MAX(ModifiedDate)</text>

  <line x1="480" y1="384" x2="510" y2="384" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="514" y="380" font-size="12" fill="#888780">only changed rows</text>
  <text x="514" y="396" font-size="12" fill="#888780">copied to sink</text>

  <line x1="480" y1="481" x2="510" y2="481" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="514" y="477" font-size="12" fill="#888780">saves new mark</text>
  <text x="514" y="493" font-size="12" fill="#888780">for next run</text>

  <!-- ── Sink arrow + box ────────────────────────────────── -->
  <line x1="200" y1="384" x2="80" y2="384" stroke="#6B7A94" stroke-width="1"/>
  <line x1="80" y1="384" x2="80" y2="606" stroke="#6B7A94" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="58" y="500" text-anchor="middle" font-size="12" fill="#888780">delta</text>
  <text x="58" y="514" text-anchor="middle" font-size="12" fill="#888780">rows</text>

  <rect x="40" y="606" width="200" height="54" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="140" y="628" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Sink — ADLS / SQL</text>
  <text x="140" y="648" text-anchor="middle" font-size="12" fill="#0F6E56">Delta rows appended</text>

  <!-- ── Footer ─────────────────────────────────────────── -->
  <text x="340" y="712" text-anchor="middle" font-size="11" fill="#B4B2A9">Azure Data Factory v2 · Watermark Incremental Copy · April 2026</text>
</svg>
